<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Smart Orchard</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, Arial, sans-serif;
            background: linear-gradient(135deg, #2e7d32 0%, #66bb6a 50%, #a5d6a7 100%);
            min-height: 100vh;
            color: #333;
            padding: 24px 16px;
        }

        .container {
            max-width: 520px;
            margin: 40px auto;
            background: #fff;
            padding: 36px 32px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 1.65rem;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin: 0 0 28px 0;
            line-height: 1.5;
        }

        /* Hide native file input */
        .file-input-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .upload-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .upload-label {
            display: inline-block;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #43a047, #66bb6a);
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(67, 160, 71, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .upload-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(67, 160, 71, 0.45);
        }

        .file-name {
            font-size: 13px;
            color: #555;
            margin: 0;
            min-height: 1.3em;
            word-break: break-all;
            max-width: 100%;
        }

        .actions {
            margin-top: 20px;
        }

        #detectBtn {
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #2e7d32, #43a047);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s;
        }

        #detectBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 26px rgba(46, 125, 50, 0.4);
        }

        #detectBtn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #preview {
            margin-top: 24px;
            width: 100%;
            max-width: 280px;
            height: auto;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            object-fit: cover;
        }

        #output {
            margin-top: 28px;
            font-size: 15px;
        }

        .result-card {
            margin-top: 8px;
            padding: 24px;
            border-radius: 16px;
            text-align: left;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
        }

        .result-card.healthy {
            background: linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 100%);
            color: #1b5e20;
            border: 1px solid #a5d6a7;
        }

        .result-card.disease {
            background: linear-gradient(180deg, #ffebee 0%, #ffcdd2 100%);
            color: #b71c1c;
            border: 1px solid #ef9a9a;
        }

        .result-card.uncertain {
            background: linear-gradient(180deg, #fffde7 0%, #fff9c4 100%);
            color: #f57f17;
            border: 1px solid #ffe082;
        }

        .disease-name {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 6px 0;
            line-height: 1.3;
        }

        .friendly-note {
            font-size: 14px;
            margin: 0 0 16px 0;
            opacity: 0.95;
            line-height: 1.5;
        }

        .row {
            margin: 12px 0;
            font-size: 14px;
            line-height: 1.5;
        }

        .row .label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            opacity: 0.85;
            margin-bottom: 4px;
        }

        .row strong {
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Smart Orchard AI</h2>
    <p class="subtitle">Detect apple leaf diseases and get instant treatment advice</p>

    <div class="upload-wrap">
        <input type="file" id="file" class="file-input-hidden" accept="image/*">
        <label for="file" class="upload-label">📷 Upload Leaf Image</label>
        <p id="fileName" class="file-name">No file selected</p>
    </div>

    <div class="actions">
        <button type="button" id="detectBtn" onclick="sendImage()">Detect Disease</button>
    </div>

    <img id="preview" alt="" />

    <div id="output"></div>
</div>

<script>
document.getElementById("file").addEventListener("change", function () {
    const f = this.files[0];
    document.getElementById("fileName").textContent = f ? f.name : "No file selected";
});

function sendImage() {
    const fileInput = document.getElementById("file");
    const detectBtn = document.getElementById("detectBtn");
    const outputEl = document.getElementById("output");
    const file = fileInput.files[0];

    if (!file) {
        outputEl.innerText = "Please select an image first.";
        return;
    }

    document.getElementById("preview").src = URL.createObjectURL(file);

    detectBtn.innerText = "Detecting...";
    outputEl.innerText = "";
    detectBtn.disabled = true;

    const formData = new FormData();
    formData.append("file", file);

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            outputEl.innerText = "Error: " + data.error;
            return;
        }

        const disease = data.disease;
        const explanation = data.explanation || "";
        const treatment = data.treatment || "";
        const conf = data.confidence;

        if (disease === "Uncertain") {
            outputEl.innerHTML =
                `<div class="result-card uncertain">
                    <div class="disease-name">⚠️ Not sure about this image</div>
                    <p class="friendly-note">Please upload a clearer apple leaf image (avoid fruit or background)</p>
                    <div class="row">
                        <span class="label">Confidence</span>
                        <strong>${conf}%</strong>
                    </div>
                    <div class="row">
                        <span class="label">Note</span>
                        ${explanation}
                    </div>
                    <div class="row">
                        <span class="label">What to do</span>
                        ${treatment}
                    </div>
                </div>`;
            return;
        }

        let cardClass = "disease";
        let titleHtml = "";
        if (disease === "Healthy") {
            cardClass = "healthy";
            titleHtml = `<div class="disease-name">✅ Healthy</div>`;
        } else {
            titleHtml = `<div class="disease-name">⚠️ ${disease}</div>`;
        }

        outputEl.innerHTML =
            `<div class="result-card ${cardClass}">
                ${titleHtml}
                <div class="row">
                    <span class="label">Confidence</span>
                    <strong>${conf}%</strong>
                </div>
                <div class="row">
                    <span class="label">Explanation</span>
                    ${explanation}
                </div>
                <div class="row">
                    <span class="label">Treatment</span>
                    ${treatment}
                </div>
            </div>`;
    })
    .catch(err => {
        outputEl.innerText = "Error: " + err;
    })
    .finally(() => {
        detectBtn.innerText = "Detect Disease";
        detectBtn.disabled = false;
    });
}
</script>

</body>
</html>
